---
layout: edu
---

<div style="width: 100%; padding-top: 140px; box-sizing: border-box;">
    <div class="container">
        







            <div style="display: flex; flex-direction: column; gap: 10px;">
                <span class="section-label" style="margin: 0;">Journal / {{ page.categories | first }}</span>
                <h1 style="font-family: 'Fraunces'; font-size: clamp(2.5rem, 8vw, 5.5rem); line-height: 0.85; margin: 0; word-wrap: break-word;">
                    {{ page.title }}
                </h1>
                <div style="display: inline-block; width: fit-content; background: var(--accent); color: white; padding: 5px 15px; font-weight: 800; font-size: 0.7rem; margin-top: 10px;">
                    {{ page.date | date: "%d . %m . %Y" }}
                </div>
            </div>







        
        <div class="main-post-grid">
            
            <article class="content-area">
                <div class="post-text-body">
                    {{ content }}
                </div>
                
                <div style="margin-top: 80px; padding-top: 30px; border-top: 2px solid var(--dark);">
                    <a href="/" style="font-weight: 900; text-decoration: none; border-bottom: 3px solid var(--primary); color: var(--dark); text-transform: uppercase; font-size: 0.8rem;">
                        ← Torna alla Home
                    </a>
                </div>
            </article>
<!--
            <aside class="sidebar-area">
                <div class="top-card">
                    <div class="card-header">Info Progetto</div>
                    <div class="card-row">
                        <span>Categoria</span>
                        <p>{{ page.categories | join: ", " | default: "General" }}</p>
                    </div>
                    {% if page.tags.size > 0 %}
                    <div class="card-row">
                        <span>Tags</span>
                        <p>#{{ page.tags | join: " #" }}</p>
                    </div>
                    {% endif %}
                    <div class="card-row" style="background: var(--yellow); border-bottom: none;">
                        <span>Status</span>
                        <p>Documento Pubblico</p>
                    </div>
                </div>
            </aside>
-->
        </div>
    </div>
</div>

<style>
    /* Reset per evitare conflitti */
    .main-post-grid {
        display: grid;
        grid-template-columns: 1fr 350px;
        gap: 50px;
        align-items: start;
        padding: 50px 0;
    }

    .post-text-body {
        font-family: 'Outfit', sans-serif;
        font-size: 1.2rem;
        line-height: 1.5;
        color: var(--dark);
    }

    /* Stile per gli elementi Markdown */
    .post-text-body h2 { font-family: 'Fraunces'; font-size: 2.5rem; margin: 40px 0 20px; color: var(--primary); }
    .post-text-body p { margin-bottom: 20px; }
    .post-text-body ul { margin-bottom: 20px; padding-left: 20px; }
    .post-text-body li { list-style: square; margin-bottom: 10px; font-weight: 600; }

    /* Fix per la card che spariva o si rompeva */
    .sidebar-area .top-card {
        border: var(--border);
        background: white;
        display: block; /* Forza il blocco */
    }

    /* Responsive */
    @media (max-width: 1024px) {
        .main-post-grid {
            grid-template-columns: 1fr;
        }
        .sidebar-area {
            order: -1; /* Sidebar sopra su mobile */
            margin-bottom: 30px;
        }
        .sidebar-area .top-card {
            width: 100%;
        }
    }
</style>
