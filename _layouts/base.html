<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'it' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title | default: "Portfolio" }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,900;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/style.css">

  </head>
<body class="{{ page.body_class }}">

    <header class="anim-ready delay-1">
        <a href="{{ '/' | relative_url }}" class="brand-name">{{ site.author | default: "NOME COGNOME" }}</a>
        <nav>
            <a href="{{ '/illustration/' | relative_url }}">ILLUSTRATION</a>
            <a href="{{ '/didattica/' | relative_url }}">DIDATTICA</a>
            <a href="{{ '/progetti/' | relative_url }}">PROGETTI</a>
            <a href="{{ '/about/' | relative_url }}">ABOUT</a>
            <a href="{{ '/contact/' | relative_url }}">CONTACT</a>
        </nav>
    </header>

    {{ content }}

    <footer class="anim-ready delay-4">
        <div class="copyright-text">
            ALL IMAGES ©Gabriel Jones ©DaGab  UNLESS OTHERWISE STATED & MAY NOT BE USED WITHOUT PRIOR WRITTEN PERMISSION
        </div>
    </footer>

</body>
</html>
