---
layout: default
---

<main class="main-wrapper anim-ready delay-2">
    <div class="post-container">
        
        <article class="post-header">
            <div class="card-meta">{{ page.date | date: "%B %Y" }} • {{ page.category }}</div>
            <h1 class="post-main-title">{{ page.title }}</h1>
        </article>

        <div class="post-body">
            {{ content }}
        </div>

    </div>
</main>
