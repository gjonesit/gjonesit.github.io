---
layout: default
---
<main class="main-content">
    <div class="container">
        <article class="post-page">
            
            <header class="post-header">
                <span class="post-category-tag">
                    {% if page.categories.size > 0 %}
                        {{ page.categories | first }}
                    {% else %}
                        Journal
                    {% endif %}
                </span>
                
                <h1 class="post-title">{{ page.title }}</h1>
                
                <div class="post-meta">
                    <div class="meta-item">
                        <span class="meta-label">DATA:</span> 
                        <time datetime="{{ page.date | date_to_xmlschema }}">
                            {{ page.date | date: "%d.%m.%Y" }}
                        </time>
                    </div>
                    {% if page.author %}
                    <div class="meta-item">
                        <span class="meta-label">AUTORE:</span> {{ page.author }}
                    </div>
                    {% endif %}
                </div>
            </header>

            <hr class="post-divider">

            <section class="post-body">
                {{ content }}
            </section>

            <footer class="post-footer">
                <a href="{{ site.baseurl }}/" class="back-link">
                    <span class="arrow">←</span> TORNA ALL'INDICE
                </a>
            </footer>
            
        </article>
    </div>
</main>

<style>
    /* Spostiamo tutto il CSS specifico qui o nel tuo file main.css */
    .main-content {
        padding-top: 180px; 
        min-height: 80vh;
        background-color: var(--surface);
    }

    .post-page {
        max-width: 900px;
        margin: 0 auto;
        padding-bottom: 100px;
    }

    .post-category-tag {
        display: inline-block;
        background: var(--accent);
        color: white;
        padding: 6px 15px;
        font-weight: 900;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 25px;
    }

    .post-title {
        font-family: 'Fraunces', serif;
        font-size: clamp(2.8rem, 8vw, 5.5rem);
        line-height: 0.85;
        letter-spacing: -3px;
        margin-bottom: 40px;
        color: var(--dark);
    }

    .post-meta {
        border-top: var(--border);
        padding-top: 25px;
        display: flex;
        gap: 40px;
    }

    .meta-item {
        font-size: 0.85rem;
        font-weight: 800;
        text-transform: uppercase;
    }

    .meta-label {
        color: var(--primary);
        margin-right: 8px;
    }

    .post-divider {
        border: 0;
        border-top: 6px solid var(--dark);
        margin: 50px 0;
    }

    /* TYPOGRAPHY OVERRIDE PER IL CONTENT GENERATO DA MARKDOWN */
    .post-body {
        font-size: 1.25rem;
        line-height: 1.6;
        color: var(--dark);
    }

    .post-body p { margin-bottom: 2rem; }
    
    .post-body h2, .post-body h3 {
        font-family: 'Fraunces', serif;
        line-height: 1;
        margin: 4rem 0 1.5rem;
    }

    .post-body h2 { font-size: 3rem; letter-spacing: -1px; }

    .post-body ul, .post-body ol { 
        margin-bottom: 2.5rem; 
        padding-left: 25px;
    }
    
    .post-body li { 
        margin-bottom: 12px;
        font-weight: 500;
    }

    .post-body blockquote {
        background: var(--yellow);
        border: var(--border);
        padding: 50px;
        margin: 60px 0;
        font-family: 'Fraunces';
        font-size: 2rem;
        font-weight: 700;
        line-height: 1.1;
        position: relative;
    }

    .post-body img {
        width: 100%;
        height: auto;
        display: block;
        border: var(--border);
        box-shadow: 12px 12px 0 var(--primary);
        margin: 4rem 0;
    }

    .post-footer {
        margin-top: 100px;
        padding-top: 40px;
        border-top: var(--border);
    }

    .back-link {
        font-weight: 900;
        color: var(--dark);
        display: inline-flex;
        align-items: center;
        gap: 20px;
        font-size: 0.9rem;
        transition: var(--transition);
    }

    .back-link .arrow {
        background: var(--primary);
        color: white;
        width: 60px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: var(--border);
    }

    .back-link:hover .arrow {
        background: var(--accent);
        transform: translateX(-12px);
    }

    @media (max-width: 1024px) {
        .main-content { padding-top: 140px; }
        .post-title { font-size: 3.5rem; }
        .post-body blockquote { padding: 30px; font-size: 1.5rem; }
    }
</style>
